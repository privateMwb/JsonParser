name: Build and Test

on:
  push:
  pull_request:

jobs:
  build:
    name: "${{ matrix.os }} | ${{ matrix.compiler }} | ${{ matrix.build_type }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: ubuntu-latest
            compiler: GCC
            cxx: g++
            build_type: Debug

          - os: ubuntu-latest
            compiler: GCC
            cxx: g++
            build_type: Release

          - os: ubuntu-latest
            compiler: Clang
            cxx: clang++
            build_type: Debug

          - os: ubuntu-latest
            compiler: Clang
            cxx: clang++
            build_type: Release

          - os: windows-latest
            compiler: MSVC
            build_type: Debug

          - os: windows-latest
            compiler: MSVC
            build_type: Release

          - os: macos-latest
            compiler: AppleClang
            cxx: clang++
            build_type: Debug

          - os: macos-latest
            compiler: AppleClang
            cxx: clang++
            build_type: Release

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies(Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build g++ clang

      - name: Configure
        env:
          CXX: ${{ matrix.cxx || '' }}
        run: >
          cmake -S .
          -B build-${{ matrix.compiler }}-${{ matrix.build_type }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          
      - name: Build
        run: cmake --build build-${{ matrix.compiler }}-${{ matrix.build_type }} --config ${{ matrix.build_type }}

      - name: Run Tests
        run: ctest --test-dir build-${{ matrix.compiler }}-${{ matrix.build_type }} -C ${{ matrix.build_type }} --output-on-failure