name: Benchmarks

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for this run (e.g. v1.1.0). Required for manual runs — leave blank to skip committing a snapshot.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake clang

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Benchmarks
        run: cmake --build build --target benchmarks

      - name: Ensure results directory exists
        run: mkdir -p benchmarks/results

      - name: Run Benchmarks
        run: ./build/benchmarks

      - name: Build Regression
        run: cmake --build build --target regression

      - name: Run Regression
        run: ./build/regression

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Save Benchmark Json Snapshot
        if: steps.version.outputs.version != ''
        run: |
          mkdir -p benchmarks/baselines
          cp benchmarks/results/benchmark_results.json "benchmarks/baselines/${{ steps.version.outputs.version }}.json"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "benchmarks/baselines/${{ steps.version.outputs.version }}.json"
          git diff --staged --quiet || git commit -m "benchmarks: add json results for ${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - name: Upload Benchmark Json Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-json
          path: benchmarks/results/benchmark_results.json

      - name: Save Benchmark Markdown Snapshot
        if: steps.version.outputs.version != ''
        run: |
          mkdir -p benchmarks/baselines
          cp benchmarks/results/benchmark_results.md "benchmarks/baselines/${{ steps.version.outputs.version }}.md"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "benchmarks/baselines/${{ steps.version.outputs.version }}.md"
          git diff --staged --quiet || git commit -m "benchmarks: add markdown results for ${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - name: Upload Benchmark Markdown Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-md
          path: benchmarks/results/benchmark_results.md

      - name: Upload Regression Json Results
        uses: actions/upload-artifact@v4
        with:
          name: regression-results-json
          path: benchmarks/results/regression_results.json

      - name: Upload Regression Markdown Results
        uses: actions/upload-artifact@v4
        with:
          name: regression-results-md
          path: benchmarks/results/regression_results.md